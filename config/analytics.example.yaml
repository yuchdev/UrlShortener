analytics:
  enabled: true
  queue_capacity: 8192
  batch_size: 128
  flush_interval_ms: 1000
  max_retry_attempts: 3
  retry_backoff_ms: 100
  retention_days: 90
  client_hash_salt_env: URL_SHORTENER_ANALYTICS_HASH_SALT
  backend: inmemory # inmemory|sqlite|postgres|noop (noop implies disabled persistence)
  disabled_behavior: "redirect path unaffected; no worker started"
  sanitizer:
    max_domain_bytes: 255
    max_referrer_bytes: 512
    max_user_agent_bytes: 512
