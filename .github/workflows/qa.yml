name: Agentic QA

on:
  workflow_dispatch:
    inputs:
      sections:
        description: "Comma-separated section list (optional)"
        required: false
        default: ""
  pull_request:
    paths:
      - "docs/qa/**"
      - "qa/**"
      - "tools/sqlite_state_assert.py"
      - "tests/integration/test_sqlite_state_assert_runtime_cli.py"
      - ".github/workflows/qa.yml"

jobs:
  qa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: python -m pip install --upgrade pip pytest

      - name: Run sqlite_state_assert tests
        run: |
          python -m pytest \
            tests/unit/test_sqlite_state_assert_matchers.py \
            tests/unit/test_sqlite_state_assert_compare.py \
            tests/unit/test_sqlite_state_assert_json_validation.py \
            tests/integration/test_sqlite_state_assert_cli.py \
            tests/integration/test_sqlite_state_assert_runtime_cli.py

      - name: Run QA sections
        env:
          QA_SECTIONS: ${{ github.event.inputs.sections }}
        run: bash qa/scripts/run_all_sections.sh

      - name: Print compact summary
        if: always()
        run: |
          if [[ -f qa/failures/summary.txt ]]; then
            cat qa/failures/summary.txt
          else
            echo "No summary produced."
          fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-failures
          path: |
            qa/failures/
            qa_failures/
